<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>О нас — Истина Зёрен</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-inner">

  <div class="header-wrap" id="header-wrap">
    <header class="header" id="header">
      <nav class="header__nav">
        <a href="index.html" class="header__link" data-text="Главная">Главная</a>
        <a href="menu.html" class="header__link" data-text="Меню">Меню</a>
        <a href="about.html" class="header__link header__link--active" data-text="О нас">О нас</a>
        <a href="order.html" class="header__link" data-text="Заказать онлайн">Заказать онлайн</a>
      </nav>
    </header>

    <div class="cart-wrap">
      <button class="header__cart" type="button" id="cart-btn" aria-label="Корзина">
        <span class="header__cart-count" id="cart-count" hidden>0</span>
        <svg class="header__cart-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14h9.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.05 5H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.38-.68z"/>
        </svg>
      </button>
      <aside class="cart-panel" id="cart-panel" hidden aria-label="Содержимое корзины">
        <h2 class="cart-panel__title">Корзина</h2>
        <p class="cart-panel__empty" id="cart-empty">Пока пусто — выберите блюда в меню</p>
        <ul class="cart-panel__list" id="cart-list"></ul>
        <div class="cart-panel__divider" id="cart-divider" hidden></div>
        <div class="cart-panel__total" id="cart-total-row" hidden>
          <span class="cart-panel__total-label">Итого</span>
          <span class="cart-panel__total-price" id="cart-total">0 ₽</span>
        </div>
        <a href="order.html" class="btn btn--primary cart-panel__order" id="cart-order-btn" hidden>Заказать</a>
      </aside>
    </div>
  </div>

  <main class="page-content">
    <h1 class="page-content__title">О нас</h1>
    <p class="page-content__text">
      «Истина Зёрен» — уютная крафтовая кофейня. Мы сами обжариваем зёрна,
      готовим каждую чашку вручную и создаём пространство, куда хочется возвращаться.
    </p>
  </main>

  <script src="script.js"></script>
